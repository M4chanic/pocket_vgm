name: build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      seeds:
        description: "полная матрица сидов (release-сборка)"
        type: boolean
        default: false

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verilator и zlib
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends verilator zlib1g-dev

      - name: Сборка chipbox_tb
        run: make -C sim/chipbox_tb -j"$(nproc)"

      - name: Селфтесты (сброс/пауза/ff/NSF/GBS/SID/APU)
        working-directory: sim/chipbox_tb
        run: |
          ./chipbox_tb --reset-selftest
          ./chipbox_tb --pause-selftest
          ./chipbox_tb --ff-selftest
          ./chipbox_tb --vrc6-selftest
          ./chipbox_tb --nsf-selftest
          ./chipbox_tb --gbs-selftest
          ./chipbox_tb --sid-selftest
          ./chipbox_tb --apu-selftest

  bitstream:
    strategy:
      fail-fast: false
      matrix:
        # экономия Actions-минут: обычный пуш — один сид; полная
        # матрица — ручной запуск workflow_dispatch с seeds=true
        seed: ${{ (github.event_name == 'workflow_dispatch' && inputs.seeds) && fromJSON('[1, 7, 23]') || fromJSON('[23]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Освободить диск раннера (образ Quartus ~14 ГБ распакованный)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h /

      - name: SEED ${{ matrix.seed }}
        run: |
          sed -i 's/-name SEED .*/-name SEED ${{ matrix.seed }}/' \
            core/projects/openFPGA-RISC-V_pocket.qsf
          grep 'SEED' core/projects/openFPGA-RISC-V_pocket.qsf

      - name: Компиляция Quartus
        run: |
          docker run --rm -v "$PWD":/build -w /build raetro/quartus:21.1 \
            quartus_sh --flow compile core/projects/openFPGA-RISC-V_pocket.qpf

      - name: Отчёт по таймингам
        run: |
          grep -A4 'Slack' core/projects/output_files/*.sta.summary || true

      - name: Топ потребителей площади (ALM по entity)
        run: |
          awk '/Fitter Resource Utilization by Entity/,/^$/' \
            core/projects/output_files/*.fit.rpt | head -200 || true

      - name: Худшие setup-пути (report_timing)
        run: |
          cat > sta_paths.tcl <<'TCL'
          project_open core/projects/openFPGA-RISC-V_pocket -revision openFPGA-RISC-V_pocket
          create_timing_netlist
          read_sdc
          update_timing_netlist
          report_timing -setup -npaths 10 -detail full_path -file sta_paths.txt
          project_close
          TCL
          docker run --rm -v "$PWD":/build -w /build raetro/quartus:21.1 \
            quartus_sta -t sta_paths.tcl || true
          head -120 sta_paths.txt || true

      - name: Worst setup slack -> slack.txt
        run: |
          awk '/^Type.*Setup/{t=1;next} /^Slack/{if(t){print $3};t=0}' \
            core/projects/output_files/*.sta.summary | sort -g | head -1 | tee slack.txt

      - name: RBF -> REV (бит-реверс)
        run: |
          python3 scripts/reverse_bits.py \
            core/projects/output_files/openFPGA-RISC-V_pocket.rbf pocketvgm.rev

      - uses: actions/upload-artifact@v4
        with:
          name: bitstream-seed${{ matrix.seed }}
          path: |
            pocketvgm.rev
            slack.txt

      - uses: actions/upload-artifact@v4
        with:
          name: reports-seed${{ matrix.seed }}
          path: |
            core/projects/output_files/*.fit.rpt
            core/projects/output_files/*.sta.rpt
            core/projects/output_files/*.sta.summary
            sta_paths.txt

  pick:
    needs: bitstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bitstream-seed*

      - name: Выбор битстрима с лучшим slack
        run: |
          best=""
          best_slack=-1000
          for d in bitstream-seed*; do
            s=$(cat "$d/slack.txt")
            echo "$d: slack $s"
            if awk -v a="$s" -v b="$best_slack" 'BEGIN{exit !(a>b)}'; then
              best_slack=$s
              best=$d
            fi
          done
          echo "ЛУЧШИЙ: $best (slack $best_slack)"
          cp "$best/pocketvgm.rev" pocketvgm.rev
          cp "$best/slack.txt" slack.txt

      - uses: actions/upload-artifact@v4
        with:
          name: bitstream
          path: |
            pocketvgm.rev
            slack.txt

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools

      - name: cargo-binutils
        run: cargo install cargo-binutils

      - name: Тесты vgm-core (host)
        run: cargo test --manifest-path firmware/vgm-core/Cargo.toml

      - name: Сборка плеера
        working-directory: core/lang/rust/examples/player
        run: |
          cargo build --release
          cargo objcopy --release -- -O binary boot.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: core/lang/rust/examples/player/boot.bin

  package:
    needs: [pick, firmware]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bitstream
      - uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Сборка пакета ядра
        run: |
          mkdir -p dist
          cp -r core/pkg/pocket/* dist/
          cp pocketvgm.rev dist/Cores/M4chanic.PocketVGM/
          cp boot.bin dist/Assets/pocketvgm/common/
                    install -m 755 scripts/pocketvgm_update.py dist/pocketvgm
          cd dist && zip -r ../m4pocket-core.zip . -x '*.gitkeep'

      - uses: actions/upload-artifact@v4
        with:
          name: m4pocket-core
          path: m4pocket-core.zip
